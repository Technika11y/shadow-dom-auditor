name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No lockfile yet (pre-alpha) — switch to `npm ci` once package-lock.json is committed.
      - run: npm install
      - run: npm test

  hygiene:
    # The shared Technika11y "shift-left" gate, trimmed to what a pre-alpha lib needs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: secret scan
        uses: gitleaks/gitleaks-action@v2

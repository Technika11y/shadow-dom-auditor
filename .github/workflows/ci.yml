name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No lockfile yet (pre-alpha) — switch to `npm ci` once package-lock.json is committed.
      - run: npm install
      - run: npm test

  hygiene:
    # The shared Technika11y "shift-left" gate, trimmed to what a pre-alpha lib needs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz -o gl.tgz
          tar -xzf gl.tgz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
